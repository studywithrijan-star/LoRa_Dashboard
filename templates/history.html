<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LoRa Dashboard History</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%233b82f6'/><text x='50' y='67' text-anchor='middle' font-size='48' fill='white' font-family='Arial' font-weight='bold'>H</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .history-container {
            padding: 20px;
            text-align: center;
        }

        .tab-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-buttons button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            background: #1e293b;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-buttons button.active { background: #3b82f6; }
        .tab-buttons button:hover  { background: #2563eb; }

        /* ── iframe wrapper ─────────────────────────────────── */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            overflow-x: auto;
            border: 1px solid #ccc;
            border-radius: 10px;
            min-height: 80vh;
        }

        iframe {
            width: 100%;
            min-width: 1200px;
            height: 80vh;
            border: none;
            display: block;
            transition: opacity 0.3s;
        }

        @media (max-width: 768px) {
            iframe { min-width: 900px; height: 70vh; }
            .iframe-wrapper { min-height: 70vh; }
        }
        @media (max-width: 480px) {
            iframe { min-width: 700px; height: 60vh; }
            .iframe-wrapper { min-height: 60vh; }
        }

        /* ── Loading overlay ────────────────────────────────── */
        #loadingOverlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: #f8fafc;
            border-radius: 10px;
            z-index: 10;
            transition: opacity 0.35s;
        }
        #loadingOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingOverlay p {
            color: #64748b;
            font-size: 0.9rem;
            margin: 0;
        }

        /* ── Last refreshed badge ───────────────────────────── */
        #refreshBadge {
            display: inline-block;
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: #64748b;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 3px 12px;
            font-style: italic;
            min-width: 180px;
        }

        /* ── Manual refresh button ──────────────────────────── */
        #refreshBtn {
            background: none;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 8px;
            transition: 0.2s;
        }
        #refreshBtn:hover {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>

<nav>
    <span class="menu-toggle" id="menuToggle">☰</span>
    <div class="nav-links" id="navLinks">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">LoRa Dashboard</a>
        <a href="/history" class="{% if request.path == '/history' %}active{% endif %}">History</a>
        <a href="/analysis" class="{% if request.path == '/analysis' %}active{% endif %}">Analysis</a>
    </div>
</nav>

<div class="history-container">
    <h1>Node History</h1>
    <p>Click a node to view its historical data:</p>

    <div class="tab-buttons">
        <button class="tab-btn active" data-node="1">Node 1</button>
        <button class="tab-btn" data-node="2">Node 2</button>
        <button class="tab-btn" data-node="3">Node 3</button>
    </div>

    <!-- Last-refreshed + manual refresh -->
    <div style="margin-bottom: 10px;">
        <span id="refreshBadge">Loading…</span>
        <button id="refreshBtn" title="Reload current sheet">↻ Refresh</button>
    </div>

    <div class="iframe-wrapper">

        <!-- Loading overlay (shown while iframe is loading) -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <p>Loading sheet data…</p>
        </div>

        <iframe id="sheetFrame" src=""></iframe>
    </div>
</div>

<script>
    const buttons      = document.querySelectorAll(".tab-btn");
    const sheetFrame   = document.getElementById("sheetFrame");
    const overlay      = document.getElementById("loadingOverlay");
    const refreshBadge = document.getElementById("refreshBadge");
    const refreshBtn   = document.getElementById("refreshBtn");

    const SHEET_URLS = {
        "1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdE_ypjaSCAc58yEAkoGoCG12jR7h2aSh-MB1SQiOXZuo-NpS-VB28hvDVTPXa_lUJb1KoJxHRUNSy/pubhtml?gid=0&single=true",
        "2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdE_ypjaSCAc58yEAkoGoCG12jR7h2aSh-MB1SQiOXZuo-NpS-VB28hvDVTPXa_lUJb1KoJxHRUNSy/pubhtml?gid=1418193114&single=true",
        "3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdE_ypjaSCAc58yEAkoGoCG12jR7h2aSh-MB1SQiOXZuo-NpS-VB28hvDVTPXa_lUJb1KoJxHRUNSy/pubhtml?gid=210587079&single=true"
    };

    // ── Show loading overlay, hide iframe content ────────────────
    function showLoading() {
        overlay.classList.remove("hidden");
        sheetFrame.style.opacity = "0";
        refreshBadge.textContent = "Loading…";
    }

    // ── Hide loading overlay, reveal iframe ──────────────────────
    function hideLoading() {
        overlay.classList.add("hidden");
        sheetFrame.style.opacity = "1";
        const now = new Date();
        refreshBadge.textContent =
            `Last refreshed: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
    }

    // ── Load a node's sheet ──────────────────────────────────────
    function activateTab(node) {
        buttons.forEach(btn => btn.classList.remove("active"));
        document.querySelector(`.tab-btn[data-node="${node}"]`).classList.add("active");

        showLoading();

        // cache-bust so browser always fetches fresh data
        sheetFrame.src = SHEET_URLS[node] + "&t=" + Date.now();
    }

    // ── iframe finished loading ──────────────────────────────────
    sheetFrame.addEventListener("load", hideLoading);

    // ── Safety fallback: hide overlay after 8 s even if load
    //    event doesn't fire (cross-origin iframe limitation)
    let fallbackTimer;
    sheetFrame.addEventListener("load", () => clearTimeout(fallbackTimer));

    const _origActivate = activateTab;
    function activateTabSafe(node) {
        clearTimeout(fallbackTimer);
        _origActivate(node);
        fallbackTimer = setTimeout(hideLoading, 8000);
    }

    // ── Manual refresh button ────────────────────────────────────
    refreshBtn.addEventListener("click", () => {
        const activeNode = document.querySelector(".tab-btn.active").dataset.node;
        activateTabSafe(activeNode);
    });

    // ── Wire up tab buttons ──────────────────────────────────────
    buttons.forEach(btn => {
        btn.addEventListener("click", () => activateTabSafe(btn.dataset.node));
    });

    // ── Init: load Node 1 ────────────────────────────────────────
    activateTabSafe("1");

    // ── Auto-refresh every 60 s ──────────────────────────────────
    setInterval(() => {
        const activeNode = document.querySelector(".tab-btn.active").dataset.node;
        activateTabSafe(activeNode);
    }, 60000);
</script>

<script>
    document.getElementById("menuToggle").addEventListener("click", function() {
        document.getElementById("navLinks").classList.toggle("active");
    });
    document.querySelectorAll(".nav-links a").forEach(link => {
        link.addEventListener("click", () => {
            document.getElementById("navLinks").classList.remove("active");
        });
    });
</script>

</body>
</html>
